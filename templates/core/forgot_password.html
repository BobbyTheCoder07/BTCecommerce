{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password | BobbyTheCoder{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card glass-card border-0 p-5 rounded-4 shadow-lg">
                    <div class="text-center mb-4">
                        <span class="badge-premium mb-3"><i class="fa-solid fa-rotate-left"></i> Recovery</span>
                        <h2 class="font-heading fw-bold">Forgot Password</h2>
                        <p class="text-muted">Enter your email address to recover access</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-dark">Email Address</label>
                            <input type="email" name="email" class="form-control rounded-3 py-2" placeholder="name@domain.com" required>
                        </div>
                        
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-premium py-2.5">Send Recovery Link</button>
                        </div>
                        
                        <div class="text-center">
                            <p class="text-muted small mb-0">Remember it? <a href="{% url 'login' %}" class="text-primary fw-semibold text-decoration-none" style="color: var(--accent) !important;">Back to Login</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
