services:
  - type: web
    name: btc-ecommerce
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn btc_ecommerce.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: btc-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: UPI_ID
        sync: false
      - key: UPI_MERCHANT_NAME
        value: "BobbyTheCoder"

databases:
  - name: btc-db
    plan: free
